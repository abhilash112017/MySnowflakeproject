version: 2
sources:
    - name: datafeed_shared_schema
      database: "{{('MYPROJECT')}}"
      schema: raw_schema
      tables:
        - name: raw_customerdata 
        - name : raw_orders
          columns:
            - name: id
              tests:
                - unique
                - not_null
            - name: status
              tests:
                - accepted_values:
                    arguments: 
                      values: ['placed', 'shipped', 'completed', 'returned', 'return_pending']
                    
        - name: customers
         